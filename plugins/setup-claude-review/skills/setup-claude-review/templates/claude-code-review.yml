name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:

concurrency:
  group: claude-code-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          additional_permissions: |
            actions: read
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            EVENT ACTION: ${{ github.event.action }}

            ## Step 1: Resolve previously fixed comments (on synchronize/push events)

            If EVENT ACTION is "synchronize", before reviewing new changes:
            1. Use `gh api graphql` to fetch all unresolved review threads on this PR that were authored by claude[bot]
            2. For each unresolved thread, read the comment body and check the current code to see if the issue has been fixed
            3. If the issue is fixed, resolve the thread using the `resolveReviewThread` GraphQL mutation:
               ```
               gh api graphql -F threadId='THREAD_NODE_ID' -f query='mutation($threadId: ID!) { resolveReviewThread(input: {threadId: $threadId}) { thread { id isResolved } } }'
               ```
            4. Do NOT resolve threads where the issue is still present

            To list unresolved threads:
            ```
            gh api graphql -f owner='OWNER' -f repo='REPO' -F number=PR_NUMBER -f query='query($owner: String!, $repo: String!, $number: Int!) { repository(owner: $owner, name: $repo) { pullRequest(number: $number) { reviewThreads(first: 100) { nodes { id isResolved comments(first: 1) { nodes { body author { login } path line } } } } } } }'
            ```

            ## Step 2: Review the pull request

            Review this pull request according to the priorities and focus areas defined in REVIEW.md at the repository root. If REVIEW.md does not exist, fall back to general code quality, correctness, performance, security, and test coverage review, and use CLAUDE.md for style/convention guidance.

            If REVIEW.md has a "Known Tech Debt" section, treat it as reference only: do NOT raise those items as review comments unless this PR is specifically the one fixing them. Do not flag other changed code merely for matching a pattern listed there if the PR did not introduce or touch that code.

            IMPORTANT: You MUST use the `mcp__github_inline_comment__create_inline_comment` tool to post review comments directly on the specific lines of code where issues are found. Do NOT put all feedback in a single comment. Each issue should be an inline comment on the relevant line in the diff. Only use a regular PR comment for the final summary.

          claude_args: |
            --model {{CLAUDE_MODEL}} --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh api:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
